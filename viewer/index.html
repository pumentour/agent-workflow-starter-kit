<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wiki Layer Graph</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #12161d;
      --line: #273140;
      --text: #eef3f8;
      --muted: #93a2b5;
      --accent: #66e3b4;
      --accent-2: #7aa8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      height: 100vh;
    }

    main {
      position: relative;
      min-width: 0;
    }

    header {
      position: absolute;
      top: 24px;
      left: 28px;
      z-index: 2;
      max-width: 620px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(18, 22, 29, 0.88);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 11px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    aside {
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 24px;
      overflow: auto;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #0f1319;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      margin-bottom: 2px;
    }

    .stat span,
    .meta,
    .empty {
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1319;
      padding: 16px;
      min-height: 180px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .summary {
      color: #d7dee8;
      line-height: 1.55;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 14px 0;
    }

    .tag {
      color: #06110d;
      background: var(--accent);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
    }

    .path {
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .link {
      stroke: #425064;
      stroke-opacity: 0.65;
    }

    .node circle {
      fill: #182333;
      stroke: var(--accent-2);
      stroke-width: 2;
    }

    .node.selected circle {
      fill: #15392d;
      stroke: var(--accent);
      stroke-width: 3;
    }

    .node text {
      fill: var(--text);
      font-size: 12px;
      pointer-events: none;
      paint-order: stroke;
      stroke: var(--bg);
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    @media (max-width: 880px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 320px;
      }

      aside {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main>
      <header>
        <h1>Wiki Layer Graph</h1>
        <div class="subtitle">Generated from <code>wiki/_graph.json</code>. Drag nodes, inspect relationships, and keep the knowledge layer visible.</div>
        <div class="toolbar">
          <button id="reload">Reload</button>
          <button id="center">Center</button>
          <button id="demo">Use Demo</button>
        </div>
      </header>
      <svg id="graph" aria-label="Wiki graph"></svg>
    </main>
    <aside>
      <div class="stat-grid">
        <div class="stat"><strong id="nodeCount">0</strong><span>nodes</span></div>
        <div class="stat"><strong id="linkCount">0</strong><span>links</span></div>
      </div>
      <div class="card" id="details">
        <h2>No node selected</h2>
        <p class="empty">Click a node to inspect its source, tags, and summary.</p>
      </div>
    </aside>
  </div>

  <script>
    const svg = document.querySelector("#graph");
    const details = document.querySelector("#details");
    const nodeCount = document.querySelector("#nodeCount");
    const linkCount = document.querySelector("#linkCount");
    let graphData = null;
    let selectedId = null;
    let animationId = null;

    const demoData = {
      generated_at: new Date().toISOString(),
      nodes: [
        { id: "codex-setup", title: "Codex Setup", summary: "A useful Codex setup starts with AGENTS.md and a small plugin stack.", tags: ["codex", "agents", "plugins"], source: "raw/codex.md", wiki: "wiki/codex-setup.md" },
        { id: "plugin-audit", title: "Plugin Audit", summary: "Keep only plugins that support current workflows.", tags: ["plugins", "audit"], source: "raw/plugins.md", wiki: "wiki/plugin-audit.md" },
        { id: "wiki-layer", title: "Wiki Layer", summary: "Raw files become structured wiki notes with links and graph output.", tags: ["wiki", "graph"], source: "raw/wiki.md", wiki: "wiki/wiki-layer.md" }
      ],
      links: [
        { source: "codex-setup", target: "plugin-audit", weight: 2 },
        { source: "codex-setup", target: "wiki-layer", weight: 1 },
        { source: "wiki-layer", target: "plugin-audit", weight: 1 }
      ]
    };

    async function loadData(useDemo = false) {
      if (useDemo) return demoData;
      const candidates = ["../wiki/_graph.json", "wiki/_graph.json", "./_graph.json"];
      for (const url of candidates) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (response.ok) return await response.json();
        } catch (error) {
          // Try the next path.
        }
      }
      return demoData;
    }

    function normalize(data) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 700;
      const nodes = data.nodes.map((node, index) => ({
        ...node,
        x: width / 2 + Math.cos(index) * 120,
        y: height / 2 + Math.sin(index) * 120,
        vx: 0,
        vy: 0
      }));
      const byId = new Map(nodes.map(node => [node.id, node]));
      const links = data.links
        .map(link => ({ ...link, sourceNode: byId.get(link.source), targetNode: byId.get(link.target) }))
        .filter(link => link.sourceNode && link.targetNode);
      return { ...data, nodes, links };
    }

    function tick(data) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 700;
      const centerX = width / 2;
      const centerY = height / 2;

      for (const node of data.nodes) {
        node.vx += (centerX - node.x) * 0.0008;
        node.vy += (centerY - node.y) * 0.0008;
      }

      for (let i = 0; i < data.nodes.length; i++) {
        for (let j = i + 1; j < data.nodes.length; j++) {
          const a = data.nodes[i];
          const b = data.nodes[j];
          const dx = a.x - b.x || 0.01;
          const dy = a.y - b.y || 0.01;
          const dist2 = dx * dx + dy * dy;
          const force = Math.min(900 / dist2, 0.08);
          a.vx += dx * force;
          a.vy += dy * force;
          b.vx -= dx * force;
          b.vy -= dy * force;
        }
      }

      for (const link of data.links) {
        const a = link.sourceNode;
        const b = link.targetNode;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distance = Math.sqrt(dx * dx + dy * dy) || 1;
        const target = 150 - Math.min((link.weight || 1) * 18, 70);
        const force = (distance - target) * 0.002;
        const fx = dx / distance * force;
        const fy = dy / distance * force;
        a.vx += fx;
        a.vy += fy;
        b.vx -= fx;
        b.vy -= fy;
      }

      for (const node of data.nodes) {
        node.vx *= 0.88;
        node.vy *= 0.88;
        node.x += node.vx;
        node.y += node.vy;
      }
    }

    function render(data) {
      const links = data.links.map(link => `
        <line class="link" x1="${link.sourceNode.x}" y1="${link.sourceNode.y}" x2="${link.targetNode.x}" y2="${link.targetNode.y}" stroke-width="${1 + (link.weight || 1)}"></line>
      `).join("");
      const nodes = data.nodes.map(node => `
        <g class="node ${node.id === selectedId ? "selected" : ""}" data-id="${node.id}" transform="translate(${node.x},${node.y})">
          <circle r="${18 + Math.min((node.tags || []).length, 6)}"></circle>
          <text x="26" y="4">${escapeHtml(node.title || node.id)}</text>
        </g>
      `).join("");
      svg.innerHTML = `${links}${nodes}`;
      svg.querySelectorAll(".node").forEach(element => {
        element.addEventListener("click", () => selectNode(element.dataset.id));
      });
    }

    function animate() {
      if (!graphData) return;
      tick(graphData);
      render(graphData);
      animationId = requestAnimationFrame(animate);
    }

    function selectNode(id) {
      selectedId = id;
      const node = graphData.nodes.find(item => item.id === id);
      if (!node) return;
      details.innerHTML = `
        <h2>${escapeHtml(node.title || node.id)}</h2>
        <div class="summary">${escapeHtml(node.summary || "No summary available.")}</div>
        <div class="tags">${(node.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        <div class="path">Source: ${escapeHtml(node.source || "")}</div>
        <div class="path">Wiki: ${escapeHtml(node.wiki || "")}</div>
        <div class="meta">Generated: ${escapeHtml(graphData.generated_at || "")}</div>
      `;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function boot(useDemo = false) {
      if (animationId) cancelAnimationFrame(animationId);
      graphData = normalize(await loadData(useDemo));
      selectedId = graphData.nodes[0]?.id || null;
      nodeCount.textContent = graphData.nodes.length;
      linkCount.textContent = graphData.links.length;
      if (selectedId) selectNode(selectedId);
      animate();
    }

    document.querySelector("#reload").addEventListener("click", () => boot(false));
    document.querySelector("#demo").addEventListener("click", () => boot(true));
    document.querySelector("#center").addEventListener("click", () => {
      if (!graphData) return;
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 700;
      graphData.nodes.forEach((node, index) => {
        node.x = width / 2 + Math.cos(index / graphData.nodes.length * Math.PI * 2) * 150;
        node.y = height / 2 + Math.sin(index / graphData.nodes.length * Math.PI * 2) * 150;
      });
    });

    boot(false);
  </script>
</body>
</html>
